name: groupsskywars
version: '${version}'
main: de.groupxyz.groupsskywars.Groupsskywars
api-version: '1.20'
author: GroupXyz
prefix: gsw
commands:
  round:
    description: Verwaltet die SkyWars-Runde.
    permission: gsw.ad
  mapeditor:
    description: Mapeditor
    permission: gsw.ad
  swreload:
    description: Lade die Config neu
    permission: gsw.ad
  stats:
    description: Statistiken
  leaderboard:
    description: Zeige die globale Rangliste
    aliases: [lb]
  kit:
    description: Wähle dein Kit
  skywarsinfo:
    description: Zeigt Informationen über Kits, Lootblocks und Lootdrops
    aliases: [swinfo, info]
  setfeature:
    description: Setze ein Spawn  
          punk/Luckyblock
    permission: gsw.op
  removefeature:
    description: Entferne Features im Umkreis
    permission: gsw.op
  visualize:
    description: Visualisiere Features im Map-Editor
    permission: gsw.op
  swlanguage:
    description: Bestimme die Sprache
    permission: gsw.ad

